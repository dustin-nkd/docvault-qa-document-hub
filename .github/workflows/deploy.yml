name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Tailwind CSS
        # Sprint 22 optimization: pre-compile Tailwind (tailwind.config.js +
        # src/input.css) into vendor/tailwind/tailwind.generated.css instead of
        # shipping the ~450KB CDN JIT compiler that recompiled on every page
        # load. Pinned version + `npx --yes` — no package.json install step,
        # so this doesn't touch (or depend on) the repo's unrelated deps and
        # leaves no local node_modules for the deploy step to pick up.
        run: npx --yes tailwindcss@3.4.19 -i ./src/input.css -o ./vendor/tailwind/tailwind.generated.css --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
