name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install (reproducible)
        run: npm ci

      - name: Build Tailwind CSS
        # Regenerate the pre-built Tailwind stylesheet from source before Vite
        # bundles it, so the deployed CSS can never be stale relative to markup.
        run: npm run build:css

      - name: Build app (Vite)
        # Emits dist/ — fingerprinted CSS/assets + the copied classic scripts +
        # a service worker whose precache manifest is generated from the build.
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
