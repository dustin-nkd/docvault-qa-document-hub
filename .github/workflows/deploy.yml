name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run full production and Cloudflare gate
        run: npm run check

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Build production artifact
        run: npm run build:pages

      - name: Verify deployment artifact boundary
        run: npm run check:deployment-boundary

      - name: Install supported browsers for regression tests
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser regression suite
        run: npm run test:e2e

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
